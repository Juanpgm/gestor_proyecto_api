<!doctype html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>{{ subject | default('CaliTrack') }}</title>
    <style type="text/css">
      :root {
        color-scheme: light;
      }
      body {
        background-color: #f0f4f8 !important;
        color: #111827 !important;
      }
      .email-body td {
        color: #111827 !important;
      }
      .email-content,
      .email-content p,
      .email-content li,
      .email-content span,
      .email-content a,
      .email-content b,
      .email-content i,
      .email-content u,
      .email-content strong,
      .email-content em {
        color: #111827 !important;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #f0f4f8 !important;
        }
        .email-card {
          background-color: #ffffff !important;
        }
        .email-content,
        .email-content p,
        .email-content li,
        .email-content span,
        .email-content a,
        .email-content b,
        .email-content i,
        .email-content u,
        .email-content strong,
        .email-content em {
          color: #111827 !important;
        }
      }
    </style>
    <!--[if mso]>
      <noscript>
        <xml
          ><o:OfficeDocumentSettings
            ><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings
          ></xml
        >
      </noscript>
    <![endif]-->
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f0f4f8;
      font-family:
        &quot;Segoe UI&quot;, Roboto, &quot;Helvetica Neue&quot;, Arial,
        sans-serif;
      color: #111827;
      color-scheme: light;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #f0f4f8; padding: 32px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            class="email-card"
            style="
              max-width: 600px;
              width: 100%;
              background-color: #ffffff;
              border-radius: 12px;
              overflow: hidden;
              box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            "
          >
            <!-- Cabecera -->
            <tr>
              <td
                style="background:linear-gradient(135deg,{{ header_color | default('#1a56db') }} 0%, #0f172a 120%);
                       padding:32px 40px 28px;text-align:left;"
              >
                <p
                  style="
                    margin: 0;
                    font-size: 22px;
                    font-weight: 700;
                    color: #ffffff;
                    letter-spacing: -0.3px;
                  "
                >
                  {{ header_title | default('CaliTrack') }}
                </p>
                {% if header_subtitle %}
                <p
                  style="
                    margin: 6px 0 0;
                    font-size: 13px;
                    color: rgba(255, 255, 255, 0.85);
                  "
                >
                  {{ header_subtitle }}
                </p>
                {% endif %}
              </td>
            </tr>

            <!-- Cuerpo -->
            <tr>
              <td
                class="email-body"
                style="
                  padding: 36px 40px 28px;
                  background-color: #ffffff;
                  color: #111827;
                "
              >
                <div class="email-content" style="color: #111827">
                  {% block content %}{% endblock %}
                </div>
              </td>
            </tr>

            <!-- Pie -->
            <tr>
              <td
                style="
                  background-color: #f9fafb;
                  border-top: 1px solid #e5e7eb;
                  padding: 20px 40px;
                  text-align: center;
                "
              >
                <p
                  style="
                    margin: 0;
                    font-size: 12px;
                    color: #6b7280;
                    line-height: 1.6;
                  "
                >
                  Mensaje generado automáticamente por
                  <strong>CaliTrack</strong>.<br />
                  Por favor no responda a este correo.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
