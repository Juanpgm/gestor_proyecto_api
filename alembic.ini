# Alembic configuration file.
# The real database URL is injected by migrations/env.py from DbSettings;
# this placeholder prevents alembic from failing when the ini is parsed directly.

[alembic]
script_location = migrations

# Placeholder — overridden by env.py at runtime.
sqlalchemy.url = postgresql+asyncpg://calitrack:calitrack@localhost:5432/calitrack_dev

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
