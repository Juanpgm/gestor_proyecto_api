[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=api --cov=domain --cov=etl --cov-report=term-missing
markers =
    unit: fast pure-logic tests, no I/O
    integration: requires a live Postgres+PostGIS (back/docker-compose.dev.yml)
    contract: same assertions run against both Firestore and Postgres adapters
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
