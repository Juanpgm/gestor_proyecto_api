services:
  db:
    image: postgis/postgis:16-3.4
    container_name: calitrack_pg_dev
    environment:
      POSTGRES_USER: calitrack
      POSTGRES_PASSWORD: calitrack
      POSTGRES_DB: calitrack_dev
    # Host port 5433 to avoid clashing with a native PostgreSQL service on 5432.
    ports:
      - "5433:5432"
    volumes:
      - calitrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calitrack -d calitrack_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  calitrack_pgdata:
